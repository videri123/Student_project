apiVersion: apps/v1
kind: Deployment

metadata:
  name: student-mlflow-app

spec:
  replicas: 1
  selector:
    matchLabels:
      app: student-mlflow-app
  template:
    metadata:
      labels:
        app: student-mlflow-app
    spec:
      containers:
        - name: student-mlflow-app
          image: chswarnak/student-mlflow-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          livenessProbe:
            httpGet:
                  path: /health
                  port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5

